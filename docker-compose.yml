services:
  jekyll:
    image: ruby:3.3-bookworm
    working_dir: /site
    volumes:
      - .:/site
      - bundle_cache:/usr/local/bundle
    ports:
      - "4000:4000"
      - "35729:35729"
    environment:
      JEKYLL_ENV: development
      BUNDLE_PATH: /usr/local/bundle
    command:
      - bash
      - -lc
      - "bundle install --jobs=4 && bundle exec jekyll serve --host 0.0.0.0 --port 4000 --livereload --livereload-port 35729 --force_polling"

volumes:
  bundle_cache:
