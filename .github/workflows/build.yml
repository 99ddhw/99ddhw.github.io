name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jekyll-build:
    name: Jekyll build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      JEKYLL_ENV: production
      BUNDLE_PATH: vendor/bundle
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.4"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --strict_front_matter --safe --trace

      - name: Verify required artifacts
        run: |
          test -f _site/index.html
          test -f _site/feed.xml
          test -f _site/sitemap.xml
          test -f _site/404.html
          test -f _site/assets/css/main.css
          test -f _site/assets/fonts/PretendardVariable.woff2
