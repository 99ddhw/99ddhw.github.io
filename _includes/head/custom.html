<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
<link rel="alternate icon" href="{{ '/assets/images/favicon.svg' | relative_url }}">

<link rel="preload" as="font" type="font/woff2"
      href="{{ '/assets/fonts/PretendardVariable.woff2' | relative_url }}" crossorigin>
<link rel="preload" as="font" type="font/woff2"
      href="{{ '/assets/fonts/InterVariable.woff2' | relative_url }}" crossorigin>
<link rel="preload" as="font" type="font/woff2"
      href="{{ '/assets/fonts/JetBrainsMonoVariable.woff2' | relative_url }}" crossorigin>

<script>
  (function () {
    try {
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = stored || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();
</script>
