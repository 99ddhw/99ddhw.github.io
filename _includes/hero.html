<section class="hero" aria-labelledby="hero-title">
  <div class="hero__inner">
    <p class="hero__eyebrow">{{ site.subtitle | default: site.description }}</p>
    <h1 id="hero-title" class="hero__title">
      {{ site.title }}
    </h1>
    <p class="hero__lead">
      {%- if site.author.bio -%}{{ site.author.bio }}{%- endif -%}
    </p>
  </div>
  <div class="hero__glow" aria-hidden="true"></div>
</section>
